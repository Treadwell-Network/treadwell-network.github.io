<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Treadwell Protocol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Serif+4:wght@300;400&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0c10; --text: #e8eaf0; --muted: #555c6e;
  --accent: #4a9eff; --mono: 'JetBrains Mono', monospace;
  --serif: 'Source Serif 4', Georgia, serif;
}
@media (prefers-color-scheme: light) {
  :root { --bg: #f4f2ee; --text: #1a1c22; --muted: #9a9eaa; --accent: #2a6cc4; }
}
body {
  font-family: var(--serif); background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
}
h1 { font-family: var(--mono); font-size: 4rem; font-weight: 700; color: var(--accent); opacity: 0.3; }
p { font-size: 1.1rem; color: var(--muted); margin-top: 1rem; max-width: 400px; line-height: 1.6; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.hint { font-family: var(--mono); font-size: 0.75rem; margin-top: 2rem; letter-spacing: 0.1em; color: var(--muted); }
</style>
</head>
<body>
<div>
  <h1>404</h1>
  <p>This page hasn't synced yet. The courier may not have arrived.</p>
  <p><a href="/">Return to the network</a></p>
  <div class="hint">treadwell.network</div>
</div>
</body>
</html>
